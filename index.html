<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starbucks 2026 | Reimagined</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sb-green { background-color: #006241; }
        .sb-text { color: #006241; }
        .oat-milk { background-color: #f2f0eb; }
        .card-hover:hover { transform: translateY(-8px); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="oat-milk font-sans pb-28">
    <nav class="bg-white/80 backdrop-blur-md p-4 shadow-sm flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 sb-green rounded-full flex items-center justify-center text-white text-[10px] font-bold">SB</div>
            <span class="font-black text-lg tracking-tighter">STARBUCKS</span>
        </div>
        <button class="bg-black text-white px-5 py-2 rounded-full font-bold text-xs">SIGN IN</button>
    </nav>

    <section class="p-4">
        <div class="sb-green rounded-[2.5rem] p-8 text-white relative overflow-hidden min-h-[280px] flex items-center">
            <div class="relative z-10 w-full">
                <span class="bg-white/20 px-3 py-1 rounded-full text-[10px] font-bold tracking-widest uppercase">Spring 2026</span>
                <h1 class="text-4xl font-black mt-4 mb-2 leading-tight">Lavender Bloom</h1>
                <p class="text-sm opacity-80 mb-6">Floral, creamy, and refreshing.</p>
                <button onclick="alert('☕ Brewing your Spring favorite!')" class="bg-white text-black px-6 py-3 rounded-full font-bold text-sm shadow-xl">Order Now</button>
            </div>
            <img src="https://images.unsplash.com/photo-1572286258217-40142c1c6a70?auto=format&fit=crop&q=80&w=400" class="absolute -right-20 -bottom-10 w-64 h-64 object-cover rounded-full opacity-50 rotate-12" alt="Coffee">
        </div>
    </section>

    <section class="px-4 py-6">
        <h2 class="text-xl font-black mb-6 px-2">Spring Favorites</h2>
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white p-4 rounded-[2rem] shadow-sm card-hover">
                <div class="bg-[#fcf7f2] h-40 rounded-3xl mb-4 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1541167760496-1628856ab772?auto=format&fit=crop&q=80&w=300" class="w-full h-full object-cover" alt="Latte">
                </div>
                <h3 class="font-bold text-sm leading-tight">Oatmilk Latte</h3>
                <p class="text-[10px] opacity-60 mt-1 mb-4">₱215</p>
                <button onclick="alert('Added to bag!')" class="sb-green text-white w-full py-2 rounded-xl font-bold text-xs">Add to Bag</button>
            </div>
            <div class="bg-white p-4 rounded-[2rem] shadow-sm card-hover">
                <div class="bg-[#fff0f3] h-40 rounded-3xl mb-4 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735?auto=format&fit=crop&q=80&w=300" class="w-full h-full object-cover" alt="Iced Coffee">
                </div>
                <h3 class="font-bold text-sm leading-tight">Cold Brew</h3>
                <p class="text-[10px] opacity-60 mt-1 mb-4">₱195</p>
                <button onclick="alert('Added to bag!')" class="sb-green text-white w-full py-2 rounded-xl font-bold text-xs">Add to Bag</button>
            </div>
        </div>
    </section>

    <section class="px-4 py-4 mb-4">
        <div class="bg-white p-6 rounded-[2.5rem] border-2 border-dashed border-[#006241]/20">
            <h2 class="text-3xl font-black mb-2">135 <span class="text-sm">★</span></h2>
            <div class="w-full bg-gray-100 rounded-full h-3">
                <div class="sb-green h-full rounded-full" style="width: 90%"></div>
            </div>
            <p class="text-[10px] font-bold mt-2 opacity-40">15 STARS UNTIL NEXT REWARD</p>
        </div>
    </section>

    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-black/90 backdrop-blur-xl text-white px-10 py-5 rounded-full flex gap-10 shadow-2xl z-50">
        <button class="text-xl">🏠</button>
        <button class="text-xl opacity-40">📋</button>
        <button class="text-xl opacity-40">⭐</button>
        <button class="text-xl opacity-40">📍</button>
    </div>
</body>
</html>
